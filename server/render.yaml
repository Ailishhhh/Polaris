# Render blueprint for the Polaris mentor backend.
# In Render: New > Blueprint > point at this repo. Set GEMINI_API_KEY when prompted.
services:
  - type: web
    name: polaris-mentor-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGINS
        value: '*'
