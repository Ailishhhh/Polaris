# Render blueprint for the Polaris mentor backend.
# In Render: New > Blueprint > pick this repo. It reads this file, builds the
# server/ folder, and asks you for GEMINI_API_KEY. That's it.
services:
  - type: web
    name: polaris-mentor-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGINS
        value: '*'
      # Free Groq fallback as PRIMARY (Gemini free tier is only ~20/day).
      - key: FALLBACK_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: FALLBACK_MODEL
        value: llama-3.3-70b-versatile
      - key: LLM_PRIMARY
        value: fallback
      - key: FALLBACK_API_KEY
        sync: false
      # Supabase token verification (anon key is public by design — safe to commit)
      - key: SUPABASE_URL
        value: https://nqhpmolsnovmawldduay.supabase.co
      - key: SUPABASE_ANON_KEY
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5xaHBtb2xzbm92bWF3bGRkdWF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NDg3NTIsImV4cCI6MjA5ODIyNDc1Mn0.b6BAvgXAAdnEYl3G9MnKhlluO0toPeUZ84Rj1pmhYGs
